<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLib - Digital Repository</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .hero-banner {
            background: linear-gradient(135deg, var(--accent-color) 0%, #312e81 100%);
            color: #ffffff;
            border-radius: 20px;
            padding: clamp(30px, 6vw, 60px) clamp(20px, 4vw, 40px);
            text-align: center;
            margin-bottom: 40px;
            box-shadow: var(--card-shadow);
        }
        .hero-banner h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(24px, 4vw, 40px);
            font-weight: 800;
            margin-bottom: 12px;
        }
        .hero-banner p {
            font-size: clamp(14px, 2vw, 18px);
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }
        .landing-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            padding: 0 clamp(20px, 4vw, 40px);
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            margin-bottom: 30px;
        }
        .landing-nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
        }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>

    <!-- Navigation Header -->
    <header class="landing-nav">
        <div class="logo">
            <i class="fa-solid fa-book-bookmark"></i>
            <span>SmartLib</span>
        </div>
        <div class="landing-nav-right">
            <div id="theme-toggle" class="theme-toggle">
                <i class="fa-solid fa-moon"></i>
            </div>
            <a href="/login" id="nav-auth-btn" class="btn btn-primary">Sign In</a>
        </div>
    </header>

    <div class="container">
        <!-- Hero Section -->
        <section class="hero-banner">
            <h1>Digital Academic Catalog</h1>
            <p>Access and search our university library textbooks, course reserves, and research resources in real-time.</p>
        </section>

        <!-- Catalog Search View -->
        <section class="dashboard-view">
            <div class="search-bar-container">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="catalog-search-input" placeholder="Search books by title, author, genre, or ISBN...">
                </div>
            </div>
            
            <div class="book-grid" id="catalog-books-grid">
                <!-- Seeding indicators -->
                <div style="text-align: center; width: 100%; color: var(--text-secondary); grid-column: 1 / -1; padding: 40px 0;">
                    <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 32px; margin-bottom: 12px;"></i>
                    <p>Loading catalog database...</p>
                </div>
            </div>
        </section>
    </div>

    <script src="common.js"></script>
    <script src="index.js"></script>
</body>
</html>
